<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Symbol: Farmer + Basket + WiFi (stylized minimal) -->
  <g transform="translate(40,40) scale(1)">
    <!-- Farmer head -->
    <circle cx="40" cy="30" r="20" fill="#2F5131"/>
    <!-- Body -->
    <rect x="30" y="50" width="20" height="50" rx="8" fill="#2F5131"/>
    <!-- Basket -->
    <rect x="15" y="90" width="50" height="20" rx="5" fill="#C77B2D"/>
    <!-- Produce -->
    <circle cx="25" cy="90" r="7" fill="#6BAF64"/>
    <circle cx="40" cy="90" r="7" fill="#E1B866"/>
    <circle cx="55" cy="90" r="7" fill="#6BAF64"/>
    <!-- Wi-Fi signals -->
    <path d="M40 0 Q60 10 80 0" stroke="#C77B2D" stroke-width="4" fill="none"/>
    <path d="M40 10 Q55 20 70 10" stroke="#C77B2D" stroke-width="3" fill="none"/>
    <circle cx="40" cy="15" r="3" fill="#C77B2D"/>
  </g>
</svg>
