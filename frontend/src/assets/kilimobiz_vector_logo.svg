<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <!-- Symbol: Farmer + Basket + WiFi (stylized minimal) -->
  <g transform="translate(20,40) scale(0.8)">
    <!-- Farmer body (simple silhouette) -->
    <circle cx="40" cy="30" r="20" fill="#2F5131"/>
    <rect x="30" y="50" width="20" height="50" rx="8" fill="#2F5131"/>
    <!-- Basket -->
    <rect x="15" y="90" width="50" height="20" rx="5" fill="#C77B2D"/>
    <!-- Produce in basket (circles) -->
    <circle cx="25" cy="90" r="7" fill="#6BAF64"/>
    <circle cx="40" cy="90" r="7" fill="#E1B866"/>
    <circle cx="55" cy="90" r="7" fill="#6BAF64"/>
    <!-- Wi-Fi signal above head -->
    <path d="M40 0 Q60 10 80 0" stroke="#C77B2D" stroke-width="4" fill="none"/>
    <path d="M40 10 Q55 20 70 10" stroke="#C77B2D" stroke-width="3" fill="none"/>
    <circle cx="40" cy="15" r="3" fill="#C77B2D"/>
  </g>

  <!-- Text Section -->
  <text x="150" y="80" font-family="Montserrat, Arial, sans-serif" font-size="48" font-weight="700" fill="#2F5131">
    KILIMOBIZ
  </text>
  <text x="150" y="120" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="500" fill="#C77B2D">
    Marketplace for Kenyan Farms
  </text>
</svg>
